<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DibuMente Lab — Creá, resolvé, dibujá</title>
  <meta name="description" content="DibuMente Lab: misiones creativas de matemática, dibujo e inglés para 10-15 años. Sin registro, sin datos personales.">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-shell">

    <header class="app-header">
      <p class="logo">
        <span class="logo-icon" aria-hidden="true">🧪</span>
        <span>DibuMente Lab</span>
      </p>
      <div class="header-nav">
        <span class="level-chip" id="level-chip" hidden></span>
        <button type="button" class="btn btn-ghost header-nav" data-action="show-help" aria-label="Ayuda para adultos">?</button>
      </div>
    </header>

    <main id="app-main" tabindex="-1">
      <noscript>
        <div class="card">
          <p>DibuMente Lab necesita JavaScript para funcionar. Por favor activalo en tu navegador.</p>
        </div>
      </noscript>
    </main>

    <footer class="app-footer">
      <button type="button" data-action="show-help">Ayuda para adultos</button>
      <span>·</span>
      <button type="button" data-action="show-progress">Mi progreso</button>
      <span>·</span>
      <span>🔒 Sin datos personales</span>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
